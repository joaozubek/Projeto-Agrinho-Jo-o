<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho - Quiz Agro e Meio Ambiente</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>🌱 AGRINHO 2026</h1>
        <p>Conectando o Campo e a Cidade</p>
    </header>

    <section class="banner">
        <h2>Quiz Agro e Meio Ambiente</h2>
        <p>
            Teste seus conhecimentos sobre sustentabilidade,
            agricultura e preservação ambiental.
        </p>
    </section>

    <main class="quiz-container">

        <div id="quiz">

            <h2 id="pergunta"></h2>

            <div id="respostas"></div>

            <button id="proximo">
                Próxima Pergunta
            </button>

            <div id="resultado"></div>

        </div>

    </main>

    <footer>
        <p>
            Projeto Agrinho - Educação Ambiental e Agropecuária
        </p>
    </footer>

    <script src="js/script.js"></script>

</body>
</html>
